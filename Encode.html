<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --ink: #0d0d0d;
      --ink-soft: #2a2a2a;
      --line: #e5e5e5;
      --line-strong: #cfcfcf;
      --canvas: #f4f4f5;
      --panel: #ffffff;
      --muted: #6b6b6b;
      --sidebar-w: 260px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', 'Segoe UI', Tahoma, sans-serif; background: var(--canvas); color: var(--ink); }

    /* ==== HEADER (kept as-is structurally) ==== */
    .header-custom {
      background: #ffffff; padding: 14px 40px; border-bottom: 4px solid var(--ink);
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-title-main {
      text-align: center; font-weight: 800; text-transform: uppercase;
      letter-spacing: 2px; color: var(--ink); font-size: 1.7rem; margin: 0; flex-grow: 1;
    }
    .logo-img { height: 60px; width: auto; }

    /* ==== APP SHELL: sidebar + content ==== */
    .shell { display: flex; min-height: calc(100vh - 90px); }
    .sidebar {
      width: var(--sidebar-w); background: var(--ink); color: #fff;
      display: flex; flex-direction: column; flex-shrink: 0;
      position: sticky; top: 0; align-self: flex-start;
      min-height: calc(100vh - 90px);
    }
    .sb-brand { padding: 22px 22px 14px; border-bottom: 1px solid #2c2c2c; }
    .sb-brand .sb-eyebrow { font-size: 0.65rem; letter-spacing: 3px; color: #8a8a8a; text-transform: uppercase; font-weight: 700; }
    .sb-brand .sb-title { font-size: 1.05rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; margin-top: 4px; }
    .sb-nav { flex-grow: 1; padding: 14px 12px; }
    .sb-section { font-size: 0.65rem; letter-spacing: 2.5px; color: #6b6b6b; text-transform: uppercase; font-weight: 700; padding: 8px 10px 6px; }
    .sb-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px;
      color: #d4d4d4; text-decoration: none; font-weight: 600; font-size: 0.88rem; cursor: pointer;
      border: 1px solid transparent;
    }
    .sb-item:hover { background: #1f1f1f; color: #fff; }
    .sb-item.active { background: #fff; color: var(--ink); }
    .sb-item i { font-size: 1rem; width: 18px; text-align: center; }
    .sb-footer { padding: 14px; border-top: 1px solid #2c2c2c; }
    .sb-user { padding: 8px 6px 12px; }
    .sb-user .sb-name { font-weight: 700; color: #fff; font-size: 0.92rem; line-height: 1.1; }
    .sb-user .sb-role { font-size: 0.7rem; color: #9a9a9a; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-top: 4px; }
    .sb-logout {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 9px; border: 1px solid #444; background: transparent;
      color: #fff; font-weight: 700; border-radius: 6px; font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase;
      transition: background 0.15s;
    }
    .sb-logout:hover { background: #fff; color: var(--ink); }

    .content { flex-grow: 1; padding: 30px 40px 60px; min-width: 0; }
    .page-head { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; margin-bottom: 22px; }
    .page-title { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
    .page-sub { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

    .filter-bar {
      background: #fff; border: 1px solid var(--line); border-radius: 8px;
      padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .filter-bar label { margin: 0; font-weight: 700; font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
    .filter-bar input.form-control { border: 1px solid var(--line-strong); }

    /* ==== Batch / Supplier Cards ==== */
    .batch-card {
      background: #fff; border: 1px solid var(--line-strong); border-radius: 10px;
      margin-bottom: 14px; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s;
    }
    .batch-card:hover { border-color: var(--ink); box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
    .batch-header {
      padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--line);
    }
    .batch-header .b-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .b-date { background: var(--ink); color: #fff; font-weight: 700; font-size: 0.7rem; letter-spacing: 1px;
              padding: 4px 10px; border-radius: 999px; text-transform: uppercase; }
    .b-id { font-weight: 800; color: var(--ink); letter-spacing: 0.5px; }
    .b-project { color: var(--muted); font-weight: 600; }
    .b-req { font-size: 0.78rem; color: var(--muted); font-weight: 600; }

    .mrf-details-container { display: none; padding: 18px; background: #fafafa; border-top: 1px solid var(--line); border-radius: 0 0 10px 10px; }
    .supplier-block { border: 1px solid var(--line-strong); border-radius: 8px; padding: 18px; margin-bottom: 16px; background: #fff; }
    .supplier-block + .supplier-block { margin-top: 0; }
    .block-actions { margin-bottom: 6px; }
    .remove-supplier-btn { color: #dc3545; cursor: pointer; font-weight: bold; }

    .submit-bar { display: flex; justify-content: flex-end; padding: 14px; background: #fff; border-radius: 0 0 10px 10px; border-top: 1px solid var(--line); }

    /* ==== Forms ==== */
    label.lbl { font-weight: 700; font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink); margin-bottom: 6px; display: block; }
    .form-control, .form-select { border-radius: 6px; border: 1px solid var(--line-strong); font-size: 0.88rem; }
    .form-control:focus, .form-select:focus { border-color: var(--ink); box-shadow: 0 0 0 2px rgba(0,0,0,0.08); }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* Mode toggle (Per Supplier / Per Item) */
    .mode-toggle { display: inline-flex; background: var(--canvas); border: 1px solid var(--line-strong); border-radius: 8px; padding: 3px; }
    .mode-toggle input { display: none; }
    .mode-toggle label { padding: 6px 14px; font-weight: 700; font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border-radius: 6px; cursor: pointer; margin: 0; }
    .mode-toggle input:checked + label { background: var(--ink); color: #fff; }

    /* Shared terms box */
    .shared-terms-section { background: #fafafa; border: 1px dashed var(--line-strong); border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .shared-terms-section .lbl { color: var(--ink-soft); }

    /* Items table */
    .items-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem; }
    .items-table thead th {
      background: var(--ink); color: #fff; padding: 9px 10px;
      font-size: 0.68rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; text-align: left;
      border: none;
    }
    .items-table thead th:first-child { border-radius: 6px 0 0 0; }
    .items-table thead th:last-child { border-radius: 0 6px 0 0; }
    .items-table tbody td { padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .items-table tbody tr:last-child td { border-bottom: 2px solid var(--ink); }
    .items-table tfoot td { padding: 10px; background: #f4f4f5; font-weight: 800; font-size: 0.9rem; }
    .items-table .text-end { text-align: right; }
    .items-table .text-center { text-align: center; }

    .terms-cell { padding: 6px 8px !important; }

    /* Term row */
    .term-row {
      display: grid;
      grid-template-columns: 1.6fr 1.2fr 1fr 1.2fr 30px;
      gap: 6px; align-items: center;
      padding: 6px; background: #fafafa; border: 1px solid var(--line);
      border-radius: 6px; margin-bottom: 6px;
    }
    .term-row.invalid { border-color: #dc3545; background: #fff5f5; }
    .term-row .form-control, .term-row .form-select { font-size: 0.8rem; padding: 5px 8px; height: 32px; }
    .term-row .pct-wrap { display: flex; gap: 4px; align-items: center; }
    .term-row .term-pct-custom { width: 60px; }
    .term-row .amount-wrap { display: flex; align-items: center; gap: 4px; }
    .term-row .amount-wrap .peso { font-weight: 800; font-size: 0.75rem; color: var(--muted); }
    .term-row .btn-rm {
      background: transparent; border: 1px solid var(--line-strong); color: #dc3545; font-weight: 700;
      border-radius: 4px; height: 30px; width: 30px; padding: 0;
    }
    .term-row .btn-rm:hover { background: #dc3545; color: #fff; border-color: #dc3545; }

    .add-term-btn {
      width: 100%; padding: 6px; border: 1px dashed var(--line-strong); background: #fff;
      border-radius: 6px; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      color: var(--ink-soft); cursor: pointer;
    }
    .add-term-btn:hover { border-color: var(--ink); color: var(--ink); }

    .pct-bar {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
      padding: 6px 10px; background: #fafafa; border-radius: 6px; margin-top: 4px;
    }
    .pct-bar .pct-bar-track { flex-grow: 1; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
    .pct-bar .pct-bar-fill { height: 100%; background: var(--ink); transition: width 0.2s; }
    .pct-bar.over { color: #dc3545; }
    .pct-bar.over .pct-bar-fill { background: #dc3545; }

    /* Buttons */
    .btn-ink { background: var(--ink); color: #fff; font-weight: 700; padding: 10px 22px; border: none; border-radius: 6px; letter-spacing: 1px; text-transform: uppercase; font-size: 0.82rem; }
    .btn-ink:hover { background: #000; color: #fff; }
    .btn-outline-ink { background: #fff; color: var(--ink); border: 1px solid var(--ink); font-weight: 700; padding: 7px 14px; border-radius: 6px; font-size: 0.78rem; }
    .btn-outline-ink:hover { background: var(--ink); color: #fff; }

    /* Loader */
    #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.92); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    .spinner-border { color: var(--ink) !important; }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); background: #fff; border: 1px dashed var(--line-strong); border-radius: 10px; }
    .empty-state i { font-size: 2.6rem; display: block; margin-bottom: 10px; }

    @media (max-width: 992px) {
      .shell { flex-direction: column; }
      .sidebar { width: 100%; min-height: 0; position: relative; }
      .sb-nav { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; }
      .sb-section { display: none; }
      .sb-footer { border-top: 1px solid #2c2c2c; }
    }
  </style>
</head>
<body>
<div id="loader"><div class="spinner-border" style="width: 3rem; height: 3rem;"></div><div class="mt-3 fw-bold text-uppercase">Processing...</div></div>

<div class="header-custom">
  <? if (logo1Url) { ?><img src="<?= logo1Url ?>" class="logo-img" alt="Logo 1"><? } ?>
  <h1 class="header-title-main">Encode Supplier &amp; Price</h1>
  <? if (logo2Url) { ?><img src="<?= logo2Url ?>" class="logo-img" alt="Logo 2"><? } ?>
</div>

<div class="shell">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-eyebrow">Portal</div>
      <div class="sb-title">Encoder</div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">Workspace</div>
      <a class="sb-item active"><i class="bi bi-clipboard-check"></i> Pending Encoding</a>
    </nav>
    <div class="sb-footer">
      <? if (typeof currentUserName !== 'undefined' && currentUserName) { ?>
      <div class="sb-user">
        <div class="sb-name"><?= currentUserName ?></div>
        <div class="sb-role"><i class="bi bi-person-badge"></i> <?= currentUserRole ?></div>
      </div>
      <? } ?>
      <button onclick="doLogout()" class="sb-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>

  <main class="content">
    <div class="page-head">
      <div>
        <h2 class="page-title">Approved Items Pending Encoding</h2>
        <div class="page-sub">Pick a batch, attach the supplier, enter prices and the payment schedule.</div>
      </div>
      <div class="filter-bar">
        <label>Date Range</label>
        <input type="date" id="startDate" class="form-control form-control-sm" onchange="filterEncodeQueue()" style="width:160px;">
        <span class="fw-bold mx-1">—</span>
        <input type="date" id="endDate" class="form-control form-control-sm" onchange="filterEncodeQueue()" style="width:160px;">
        <button class="btn-outline-ink" onclick="clearEncodeFilters()">Clear</button>
      </div>
    </div>

    <div id="encodeQueueBody"></div>
  </main>
</div>

<script>
  // Apps Script web apps run in a sandboxed iframe whose `sandbox` attribute
  // typically allows top-navigation-by-user-activation. Since the user just
  // clicked the LOGOUT button, that activation lets us navigate the top
  // window to the deployment URL — a clean full-page load that gets us back
  // to the login screen. If top-navigation is blocked, fall back to an
  // in-iframe replace with a cache-buster.
  // Injected via document.write() from Index.html, which reuses the same JS
  // realm. Index.html's top-level `const SCRIPT_URL` stays bound in the global
  // lexical environment after the DOM is wiped, so redeclaring it here with
  // const throws "Identifier 'SCRIPT_URL' has already been declared" and aborts
  // this whole <script> block. Assign to window.* to avoid the redeclaration.
  window.SCRIPT_URL = "<?= typeof scriptUrl !== 'undefined' ? scriptUrl : '' ?>";
  function doLogout() {
    try {
      localStorage.removeItem('mrfUser');
      localStorage.removeItem('mrfEmail');
      localStorage.removeItem('mrfRole');
    } catch (e) {}

    const target = window.SCRIPT_URL || (window.location.href.split('?')[0]);
    try {
      window.top.location.href = target;
      return;
    } catch (e) {
      // Top-navigation blocked — fall through.
    }
    window.location.replace(target + (target.indexOf('?') > -1 ? '&' : '?') + '_logout=' + Date.now());
  }
</script>

<script>
  function showLoader() { document.getElementById('loader').style.display = 'flex'; }
  function hideLoader() { document.getElementById('loader').style.display = 'none'; }

  let globalGroupsData = [];
  let validSuppliers = [];

  window.onload = () => {
    google.script.run.withSuccessHandler(list => {
        validSuppliers = list;
        loadEncodeQueue();
    }).getSupplierList();
  };

  function loadEncodeQueue() {
    showLoader();
    google.script.run.withSuccessHandler(groups => {
      const body = document.getElementById('encodeQueueBody');
      if(!groups || !groups.length) {
        body.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i>NO ITEMS PENDING ENCODING.</div>';
        hideLoader();
        return;
      }

      globalGroupsData = groups;

      let htmlString = "";
      groups.forEach(g => {
        htmlString += `
          <div class="batch-card" data-date="${g.date}" id="batch-card-${g.id}">
            <div class="batch-header" onclick="toggleDetails('${g.id}')">
              <div class="b-meta">
                <span class="b-date">${g.date}</span>
                <span class="b-id">${g.id}</span>
                <span class="b-project">${g.project}</span>
              </div>
              <div class="b-req">REQ: ${g.requestor} <i class="bi bi-chevron-down ms-2"></i></div>
            </div>
            <div id="details-${g.id}" class="mrf-details-container">
              <div id="suppliers-container-${g.id}"></div>
            </div>
            <div id="footer-${g.id}" class="submit-bar" style="display:none;">
              <button class="btn-ink" onclick="submitEncoding('${g.id}')"><i class="bi bi-send"></i> Submit All Encodings</button>
            </div>
          </div>`;
      });

      body.innerHTML = htmlString;
      groups.forEach(g => addSupplierBlock(g.id));

      hideLoader();
    }).getApprovedMRFItems();
  }

  function filterEncodeQueue() {
      const startVal = document.getElementById('startDate').value;
      const endVal = document.getElementById('endDate').value;

      const start = startVal ? new Date(startVal) : null;
      const end = endVal ? new Date(endVal) : null;
      if(start) start.setHours(0,0,0,0);
      if(end) end.setHours(23,59,59,999);

      document.querySelectorAll('.batch-card').forEach(card => {
          let show = true;
          let cardDate = new Date(card.dataset.date);
          if (start && cardDate < start) show = false;
          if (end && cardDate > end) show = false;
          card.style.display = show ? '' : 'none';
      });
  }

  function clearEncodeFilters() {
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      filterEncodeQueue();
  }

  function toggleDetails(mrfId) {
     const detailsDiv = document.getElementById('details-' + mrfId);
     const footerDiv = document.getElementById('footer-' + mrfId);
     const open = detailsDiv.style.display === 'block';
     detailsDiv.style.display = open ? 'none' : 'block';
     footerDiv.style.display = open ? 'none' : 'flex';
  }

  // ==========================================
  // Payment-term row helpers (NEW logic)
  // ==========================================

  // Locate the supplier block that owns a term container, and discover the
  // scope (shared across supplier, or this row's own subtotal). Returns
  // { block, subtotal, scopeKey } so we can recompute % ↔ amount for that
  // exact bucket of terms.
  function getTermScope(container) {
    const block = container.closest('.supplier-block');
    if (!block) return { block: null, subtotal: 0, scopeKey: '' };

    if (container.classList.contains('shared-terms-container')) {
      const subtotal = parseFloat(block.dataset.grandTotal || '0') || 0;
      return { block, subtotal, scopeKey: 'shared' };
    }
    const row = container.closest('.item-row');
    const subtotal = parseFloat((row && row.dataset.subtotal) || '0') || 0;
    return { block, subtotal, scopeKey: row ? row.id : '' };
  }

  // Returns the effective percentage chosen for a term row, or null if unset.
  // Custom value lives in .term-pct-custom (shown only when dropdown = 'custom').
  function getRowPercent(row) {
    const sel = row.querySelector('.term-pct');
    const custom = row.querySelector('.term-pct-custom');
    if (!sel || !sel.value) return null;
    if (sel.value === 'custom') {
      const v = parseFloat(custom.value);
      return isNaN(v) ? null : v;
    }
    const v = parseFloat(sel.value);
    return isNaN(v) ? null : v;
  }

  function setRowPercent(row, pct, opts) {
    opts = opts || {};
    const sel = row.querySelector('.term-pct');
    const custom = row.querySelector('.term-pct-custom');
    if (pct === null || isNaN(pct)) {
      sel.value = '';
      custom.style.display = 'none';
      custom.value = '';
      return;
    }
    const preset = [25, 50, 75, 100];
    if (preset.indexOf(pct) !== -1 && !opts.forceCustom) {
      sel.value = String(pct);
      custom.style.display = 'none';
      custom.value = '';
    } else {
      sel.value = 'custom';
      custom.style.display = '';
      custom.value = pct.toFixed(pct % 1 === 0 ? 0 : 2);
    }
  }

  function setRowAmount(row, amount) {
    const amt = row.querySelector('.term-amount');
    if (amount === null || isNaN(amount)) { amt.value = ''; return; }
    amt.value = amount.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // Re-render dropdown options for a given row so that options exceeding the
  // available remainder are disabled. Always keeps "Custom" enabled (clamped
  // on input) and preserves the row's current selection if still valid.
  function refreshDropdownAvailability(row, available) {
    const sel = row.querySelector('.term-pct');
    const current = sel.value;
    const presets = [25, 50, 75, 100];
    sel.innerHTML = '<option value="">— %</option>' +
      presets.map(p => `<option value="${p}" ${p > available + 0.0001 ? 'disabled' : ''}>${p}%</option>`).join('') +
      '<option value="custom">Custom%</option>';
    if (current) sel.value = current;
  }

  // Re-balance every term row inside a container: recompute amounts from
  // current %, refresh the dropdown availability based on what's left, and
  // update the % progress bar.
  function refreshTermContainer(container) {
    if (!container) return;
    const { block, subtotal } = getTermScope(container);
    const rows = Array.from(container.querySelectorAll('.term-row'));
    if (!rows.length) {
      const bar = container.parentElement.querySelector('.pct-bar');
      if (bar) updatePctBar(bar, 0);
      return;
    }

    const percents = rows.map(getRowPercent);
    const totalUsed = percents.reduce((a, p) => a + (p || 0), 0);

    rows.forEach((row, idx) => {
      const myPct = percents[idx] || 0;
      const usedByOthers = totalUsed - myPct;
      const available = Math.max(0, 100 - usedByOthers);
      refreshDropdownAvailability(row, available);

      const pctNow = getRowPercent(row);
      if (pctNow !== null) {
        setRowAmount(row, subtotal * pctNow / 100);
      } else {
        setRowAmount(row, null);
      }
    });

    const bar = container.parentElement.querySelector('.pct-bar');
    if (bar) updatePctBar(bar, totalUsed);
  }

  function updatePctBar(bar, total) {
    const fill = bar.querySelector('.pct-bar-fill');
    const txt = bar.querySelector('.pct-bar-text');
    const clamped = Math.min(100, total);
    fill.style.width = clamped + '%';
    txt.textContent = (total).toFixed(total % 1 === 0 ? 0 : 2) + '% of 100%';
    bar.classList.toggle('over', total > 100.0001);
  }

  // ---- Event handlers wired via inline `oninput` / `onchange` ----

  function onTermPctChange(sel) {
    const row = sel.closest('.term-row');
    const customInput = row.querySelector('.term-pct-custom');
    if (sel.value === 'custom') {
      customInput.style.display = '';
      customInput.focus();
    } else {
      customInput.style.display = 'none';
      customInput.value = '';
    }
    const container = row.closest('.shared-terms-container, .item-terms-container');
    refreshTermContainer(container);
  }

  function onTermPctCustom(input) {
    const row = input.closest('.term-row');
    const container = row.closest('.shared-terms-container, .item-terms-container');
    // Clamp to remaining-available.
    const { subtotal } = getTermScope(container);
    const rows = Array.from(container.querySelectorAll('.term-row'));
    const others = rows.filter(r => r !== row).reduce((a, r) => a + (getRowPercent(r) || 0), 0);
    const available = Math.max(0, 100 - others);
    let v = parseFloat(input.value);
    if (!isNaN(v) && v > available) {
      v = available;
      input.value = (Math.round(v * 100) / 100).toString();
    }
    refreshTermContainer(container);
  }

  function onTermAmountInput(input) {
    formatPrice(input);
    const row = input.closest('.term-row');
    const container = row.closest('.shared-terms-container, .item-terms-container');
    const { subtotal } = getTermScope(container);
    const raw = parseFloat((input.value || '').replace(/,/g, ''));

    if (!subtotal || isNaN(raw)) {
      setRowPercent(row, null);
      refreshTermContainer(container);
      return;
    }

    // % implied by this amount given subtotal — clamp to remaining-available.
    const rows = Array.from(container.querySelectorAll('.term-row'));
    const others = rows.filter(r => r !== row).reduce((a, r) => a + (getRowPercent(r) || 0), 0);
    const available = Math.max(0, 100 - others);
    let pct = (raw / subtotal) * 100;
    if (pct > available) {
      pct = available;
      input.value = (subtotal * pct / 100).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    setRowPercent(row, Math.round(pct * 100) / 100);
    refreshTermContainer(container);
  }

  function removeTermRow(btn) {
    const row = btn.closest('.term-row');
    const container = row.parentElement;
    row.remove();
    refreshTermContainer(container);
  }

  // HTML template for a fresh term row. Caller decides whether the description
  // placeholder hints at shared vs per-item — content is the same shape.
  function termRowHtml() {
    return `
      <div class="term-row">
        <input type="text" class="form-control term-desc" placeholder="e.g. Down Payment">
        <input type="date" class="form-control term-date">
        <div class="pct-wrap">
          <select class="form-select term-pct" onchange="onTermPctChange(this)">
            <option value="">— %</option>
            <option value="25">25%</option>
            <option value="50">50%</option>
            <option value="75">75%</option>
            <option value="100">100%</option>
            <option value="custom">Custom%</option>
          </select>
          <input type="number" min="0" max="100" step="0.01" class="form-control term-pct-custom" placeholder="%" style="display:none;" oninput="onTermPctCustom(this)">
        </div>
        <div class="amount-wrap">
          <span class="peso">₱</span>
          <input type="text" class="form-control term-amount" placeholder="0.00" oninput="onTermAmountInput(this)" onkeypress="return (event.charCode >= 48 && event.charCode <= 57) || event.charCode == 46">
        </div>
        <button type="button" class="btn-rm" onclick="removeTermRow(this)">✕</button>
      </div>
    `;
  }

  function pctBarHtml() {
    return `
      <div class="pct-bar">
        <span>Payment %</span>
        <div class="pct-bar-track"><div class="pct-bar-fill" style="width:0%"></div></div>
        <span class="pct-bar-text">0% of 100%</span>
      </div>
    `;
  }

  // Per-item term row appender — used by the [+ ADD TERM] button under a row.
  function addPaymentTerm(rowId) {
     const container = document.getElementById('terms-' + rowId);
     container.insertAdjacentHTML('beforeend', termRowHtml());
     refreshTermContainer(container);
  }

  // Shared (per-supplier) term row appender.
  function addSharedPaymentTerm(supplierId) {
     const container = document.getElementById('shared-terms-' + supplierId);
     if (!container) return;
     container.insertAdjacentHTML('beforeend', termRowHtml());
     refreshTermContainer(container);
  }

  // Toggle a supplier block between Per Supplier (shared schedule) and Per Item.
  function setPaymentMode(supplierId, mode) {
     const block = document.getElementById(supplierId);
     if (!block) return;
     block.dataset.paymentMode = mode;

     const sharedSection = block.querySelector('.shared-terms-section');
     if (sharedSection) sharedSection.style.display = (mode === 'supplier') ? '' : 'none';

     const termsHeader = block.querySelector('.item-terms-header');
     if (termsHeader) termsHeader.style.display = (mode === 'supplier') ? 'none' : '';

     block.querySelectorAll('.item-terms-cell').forEach(c => c.style.display = (mode === 'supplier') ? 'none' : '');

     const footFirstCell = block.querySelector('tfoot td:first-child');
     if (footFirstCell) footFirstCell.colSpan = (mode === 'supplier') ? 4 : 5;

     // Subtotal scope changes when toggling modes; refresh whichever set of
     // term containers are now visible so amounts and dropdown caps re-sync.
     if (mode === 'supplier') {
       const shared = block.querySelector('.shared-terms-container');
       refreshTermContainer(shared);
     } else {
       block.querySelectorAll('.item-terms-container').forEach(refreshTermContainer);
     }
  }

  function addSupplierBlock(mrfId) {
     const container = document.getElementById('suppliers-container-' + mrfId);
     const groupData = globalGroupsData.find(g => g.id === mrfId);
     if (!groupData) return;

     const supplierId = 'sup-' + Date.now() + Math.floor(Math.random() * 1000);

     // Per-item rows. Qty/Unit are now ALWAYS editable (no readonly), so any
     // request can have its qty/unit revised on the encoder side and the
     // subtotal updates live.
     let rows = groupData.items.map(it => {
          const safeName = (it.name || "").toString().replace(/"/g, '&quot;');
          const unitLower = (it.unit || '').toString().trim().toLowerCase();
          const isBudget = ["labor budget", "material budget", "total budget", "labor cost", "material cost", "total cost", "labor", "material", "lot"].includes(unitLower);

          const displayQty = isBudget ? 1 : (it.qty || 0);
          const displayUnit = it.unit || '';
          const uniqueRowId = `row-${Date.now()}-${Math.floor(Math.random() * 10000)}`;

          return `
          <tr class="item-row" id="${uniqueRowId}" data-item-name="${safeName}" data-original-unit="${it.unit || ''}" data-is-budget="${isBudget ? '1' : '0'}" data-subtotal="0">
            <td style="width:22%;"><input type="text" class="form-control form-control-sm name-input" value="${safeName}" readonly style="background:#f4f4f5;"></td>
            <td style="width:9%;"><input type="number" min="0" step="any" onkeydown="if(event.key==='-')return false;" class="form-control form-control-sm text-center qty-input-encode" value="${displayQty}" oninput="calculateTotals('${supplierId}')"></td>
            <td style="width:9%;"><input type="text" class="form-control form-control-sm text-center unit-input-encode" value="${displayUnit}"></td>
            <td style="width:13%;"><input type="text" class="form-control form-control-sm price-input" placeholder="${isBudget ? 'Total Amount' : 'Unit Price'}" oninput="formatPrice(this); calculateTotals('${supplierId}')" onkeypress="return (event.charCode >= 48 && event.charCode <= 57) || event.charCode == 46"></td>

            <td class="item-terms-cell terms-cell" style="width:32%;">
                <div id="terms-${uniqueRowId}" class="item-terms-container"></div>
                ${pctBarHtml()}
                <button type="button" class="add-term-btn mt-1" onclick="addPaymentTerm('${uniqueRowId}')">+ Add Term</button>
            </td>

            <td class="text-end fw-bold subtotal-display" style="width:15%;">0.00</td>
          </tr>`;
     }).join('');

     const supplierOptions = validSuppliers.map(s => `<option value="${s}">${s}</option>`).join('');

     const blockHtml = `
        <div class="supplier-block" id="${supplierId}" data-payment-mode="supplier" data-grand-total="0">
            <div class="row mb-3 g-3 align-items-start">
                <div class="col-md-5">
                    <label class="lbl">Supplier Name <span class="text-danger">*</span></label>
                    <select class="form-select supplier-name-input">
                        <option value="">-- Select Supplier --</option>
                        <option value="test">Test Supplier</option>
                        ${supplierOptions}
                    </select>
                </div>
                <div class="col-md-7">
                    <label class="lbl">Payment Schedule Applies</label>
                    <div class="mode-toggle">
                        <input type="radio" name="payment-mode-${supplierId}" id="pm-sup-${supplierId}" value="supplier" checked onchange="setPaymentMode('${supplierId}', 'supplier')">
                        <label for="pm-sup-${supplierId}">Per Supplier</label>
                        <input type="radio" name="payment-mode-${supplierId}" id="pm-item-${supplierId}" value="item" onchange="setPaymentMode('${supplierId}', 'item')">
                        <label for="pm-item-${supplierId}">Per Item</label>
                    </div>
                    <div class="small text-muted mt-1" style="font-size:0.75rem;">Each payment term becomes one row in Payment Logs.</div>
                </div>
            </div>

            <div class="shared-terms-section">
                <label class="lbl"><i class="bi bi-calendar-check"></i> Payment Schedule — Shared Across All Items</label>
                <div id="shared-terms-${supplierId}" class="shared-terms-container mt-1"></div>
                ${pctBarHtml()}
                <button type="button" class="add-term-btn mt-1" onclick="addSharedPaymentTerm('${supplierId}')">+ Add Term</button>
            </div>

            <div class="table-responsive">
              <table class="items-table">
                <thead><tr>
                  <th>Item</th>
                  <th class="text-center">Qty</th>
                  <th class="text-center">Unit</th>
                  <th>Unit Price</th>
                  <th class="item-terms-header">Payment Schedule (Per Item)</th>
                  <th class="text-end">Subtotal</th>
                </tr></thead>
                <tbody>${rows}</tbody>
                <tfoot>
                  <tr>
                    <td colspan="4" class="text-end">GRAND TOTAL</td>
                    <td class="text-end grand-total-display">0.00</td>
                  </tr>
                </tfoot>
              </table>
            </div>
        </div>
     `;

     container.insertAdjacentHTML('beforeend', blockHtml);

     // Seed one default term row for the shared schedule + one per item.
     const sharedContainer = document.getElementById('shared-terms-' + supplierId);
     sharedContainer.insertAdjacentHTML('beforeend', termRowHtml());
     refreshTermContainer(sharedContainer);

     const newBlock = document.getElementById(supplierId);
     newBlock.querySelectorAll('.item-terms-container').forEach(c => {
       c.insertAdjacentHTML('beforeend', termRowHtml());
     });

     // Default to Per Supplier mode — surfaces the shared schedule.
     setPaymentMode(supplierId, 'supplier');
  }

  function calculateTotals(supplierId) {
     const block = document.getElementById(supplierId);
     if (!block) return;

     const rows = block.querySelectorAll('.item-row');
     let grandTotal = 0;

     rows.forEach(row => {
        const isBudget = row.dataset.isBudget === '1';
        const qtyRaw = row.querySelector('.qty-input-encode').value;
        const qty = parseFloat(qtyRaw) || 0;

        const priceRaw = row.querySelector('.price-input').value.replace(/,/g, '');
        const price = parseFloat(priceRaw) || 0;

        const subtotal = isBudget ? price : (qty * price);
        grandTotal += subtotal;

        row.dataset.subtotal = subtotal;
        row.querySelector('.subtotal-display').innerText = subtotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
     });

     block.dataset.grandTotal = grandTotal;
     block.querySelector('.grand-total-display').innerText = grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

     // Subtotal/grand-total may have changed — rebalance every term container in this block.
     const mode = block.dataset.paymentMode || 'supplier';
     if (mode === 'supplier') {
       const shared = block.querySelector('.shared-terms-container');
       refreshTermContainer(shared);
     } else {
       block.querySelectorAll('.item-terms-container').forEach(refreshTermContainer);
     }
  }

  function formatPrice(el) {
    let val = el.value.replace(/[^0-9.]/g, '');
    if (val) {
      let parts = val.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      el.value = parts.join('.');
    } else {
      el.value = '';
    }
  }

  // ==========================================
  // Submission — collect supplier + per-row data
  // ==========================================
  function submitEncoding(mrfId) {
    const detailsContainer = document.getElementById('details-' + mrfId);
    const supplierBlocks = Array.from(detailsContainer.querySelectorAll('.supplier-block')).filter(block => block.style.display !== 'none');

    if (supplierBlocks.length === 0) {
        return Swal.fire('Warning', 'You must add at least one supplier before submitting.', 'warning');
    }

    let payloadUpdates = [];
    let validationFailed = false;

    for (let i = 0; i < supplierBlocks.length; i++) {
      let block = supplierBlocks[i];
      const supplierNameInput = block.querySelector('.supplier-name-input');
      const supplierName = supplierNameInput.value.trim();

      if (!supplierName) {
          supplierNameInput.style.borderColor = '#dc3545';
          validationFailed = true;
          Swal.fire('Error', `Please select a valid supplier.`, 'error');
          break;
      } else {
          supplierNameInput.style.borderColor = '';
      }

      const paymentMode = block.dataset.paymentMode || 'supplier';

      // Collected only when Per Supplier — same shared schedule applied to every priced item.
      let sharedTDescArr = [];
      let sharedTDateArr = [];
      if (paymentMode === 'supplier') {
        const sharedTermRows = block.querySelectorAll('.shared-terms-container .term-row');
        if (sharedTermRows.length === 0) {
          validationFailed = true;
          Swal.fire('Warning', 'Add at least one payment term in the shared schedule (or switch to Per Item mode).', 'warning');
          break;
        }
        const sharedPctTotal = Array.from(sharedTermRows).reduce((a, r) => a + (getRowPercent(r) || 0), 0);
        if (sharedPctTotal > 100.0001) {
          validationFailed = true;
          Swal.fire('Warning', 'Shared schedule exceeds 100%. Adjust percentages so they total ≤ 100%.', 'warning');
          break;
        }
        let sharedError = false;
        for (let t = 0; t < sharedTermRows.length; t++) {
          const r = sharedTermRows[t];
          const tDescInput = r.querySelector('.term-desc');
          const tDateInput = r.querySelector('.term-date');
          const pct = getRowPercent(r);
          const tDesc = tDescInput.value.trim();
          const tDate = tDateInput.value;
          if (!tDesc) { tDescInput.style.borderColor = '#dc3545'; sharedError = true; } else { tDescInput.style.borderColor = ''; }
          if (!tDate) { tDateInput.style.borderColor = '#dc3545'; sharedError = true; } else { tDateInput.style.borderColor = ''; }
          if (pct === null || pct <= 0) { r.classList.add('invalid'); sharedError = true; } else { r.classList.remove('invalid'); }
          if (!sharedError) {
            // Prepend the % so the backend's parseTermPercent_ recognises it
            // ("50% Down Payment" → 50%). Avoid double-prefixing if the user
            // also typed "%" into the description.
            const descOut = /(\d+(?:\.\d+)?)\s*%/.test(tDesc) ? tDesc : `${pct}% ${tDesc}`;
            sharedTDescArr.push(descOut);
            sharedTDateArr.push(tDate);
          }
        }
        if (sharedError) {
          validationFailed = true;
          Swal.fire('Warning', 'Every shared payment term needs description, date, and a percentage > 0.', 'warning');
          break;
        }
      }

      const itemRows = block.querySelectorAll('.item-row');
      let supplierHasPrices = false;
      let blockItems = [];

      for (let j = 0; j < itemRows.length; j++) {
        let row = itemRows[j];
        const priceInput = row.querySelector('.price-input');
        const qtyInput = row.querySelector('.qty-input-encode');
        const unitInput = row.querySelector('.unit-input-encode');

        const combinedQty = parseFloat(qtyInput.value) || 0;
        const newUnit = unitInput.value.trim();
        const priceRaw = priceInput.value.replace(/,/g, '');
        const price = parseFloat(priceRaw) || 0;

        if (price > 0) {
          supplierHasPrices = true;
          priceInput.style.borderColor = '';

          let rowError = false;
          if (combinedQty <= 0) { qtyInput.style.borderColor = '#dc3545'; rowError = true; } else { qtyInput.style.borderColor = ''; }
          if (newUnit === "") { unitInput.style.borderColor = '#dc3545'; rowError = true; } else { unitInput.style.borderColor = ''; }

          let tDescArr, tDateArr;
          if (paymentMode === 'supplier') {
            tDescArr = sharedTDescArr;
            tDateArr = sharedTDateArr;
          } else {
            const termRows = row.querySelectorAll('.term-row');
            tDescArr = [];
            tDateArr = [];

            if (termRows.length === 0) {
               rowError = true;
               Swal.fire('Warning', 'You must add at least one Payment Term for priced items.', 'warning');
               break;
            }
            const rowPctTotal = Array.from(termRows).reduce((a, r) => a + (getRowPercent(r) || 0), 0);
            if (rowPctTotal > 100.0001) {
              rowError = true;
              Swal.fire('Warning', `"${row.dataset.itemName}": payment schedule exceeds 100%.`, 'warning');
              break;
            }
            for (let t = 0; t < termRows.length; t++) {
               const r = termRows[t];
               const tDescInput = r.querySelector('.term-desc');
               const tDateInput = r.querySelector('.term-date');
               const pct = getRowPercent(r);
               const tDesc = tDescInput.value.trim();
               const tDate = tDateInput.value;
               if (!tDesc) { tDescInput.style.borderColor = '#dc3545'; rowError = true; } else { tDescInput.style.borderColor = ''; }
               if (!tDate) { tDateInput.style.borderColor = '#dc3545'; rowError = true; } else { tDateInput.style.borderColor = ''; }
               if (pct === null || pct <= 0) { r.classList.add('invalid'); rowError = true; } else { r.classList.remove('invalid'); }
               if (!rowError) {
                 const descOut = /(\d+(?:\.\d+)?)\s*%/.test(tDesc) ? tDesc : `${pct}% ${tDesc}`;
                 tDescArr.push(descOut);
                 tDateArr.push(tDate);
               }
            }
          }

          if (rowError) {
             validationFailed = true;
             Swal.fire('Warning', 'For priced items: Qty, Unit, Payment Term (description + date + %) cannot be blank, and total % must be ≤ 100.', 'warning');
             break;
          }

          blockItems.push({
            itemName: row.dataset.itemName,
            originalUnit: row.dataset.originalUnit,
            price: price,
            qty: combinedQty,
            unit: newUnit,
            termDesc: tDescArr.join(" | "), // pipe-joined; backend splits one row per term
            termDate: tDateArr.join(" | ")
          });
        } else if (priceRaw !== "") {
           priceInput.style.borderColor = '#dc3545';
           validationFailed = true;
           break;
        } else {
           priceInput.style.borderColor = '';
           qtyInput.style.borderColor = '';
           unitInput.style.borderColor = '';
        }
      }
      if (validationFailed) break;

      if (!supplierHasPrices && supplierName) {
          validationFailed = true;
          Swal.fire('Warning', `Supplier "${supplierName}" has no prices entered. Enter prices or remove the supplier.`, 'warning');
          break;
      }

      if (supplierName && supplierHasPrices) {
         payloadUpdates.push({
             mrfId: mrfId,
             supplierName: supplierName,
             items: blockItems
         });
      }
    }

    if (validationFailed) return;

    document.getElementById('loader').style.display = 'flex';
    google.script.run.withSuccessHandler((res) => {
      document.getElementById('loader').style.display = 'none';
      if(res.indexOf("Error") > -1) { Swal.fire('Warning', res, 'warning'); }
      else { Swal.fire('Success', 'Encoding Submitted', 'success').then(loadEncodeQueue); }
    }).processEncoding(payloadUpdates);
  }
</script>
</body>
