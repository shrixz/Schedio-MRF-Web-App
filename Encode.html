<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; color: #1a1a1a; }
    .header-custom {
      background: #ffffff; padding: 15px 40px; border-bottom: 5px solid #212529;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-title-main {
      text-align: center; font-weight: 800; text-transform: uppercase;
      letter-spacing: 2px; color: #212529; font-size: 1.8rem; margin: 0; flex-grow: 1;
    }
    .logo-img { height: 65px; width: auto; }
    /* User bar sits BELOW the header in its own strip, right-aligned. */
    .user-bar { background: #f8f9fa; border-bottom: 1px solid #dee2e6; padding: 10px 40px; display: flex; justify-content: flex-end; align-items: center; gap: 15px; font-family: 'Segoe UI', Tahoma, sans-serif; }
    .batch-card { border: 2px solid #212529; border-radius: 0; background: #fff; margin-bottom: 10px; cursor: pointer; transition: background-color 0.2s;}
    .batch-card:hover { background-color: #f1f3f5; }
    .batch-header { background: #212529; color: #ffffff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
    .batch-footer { padding: 15px 20px; border-top: 1px solid #ddd; background: #f8f9fa; display: flex; justify-content: flex-end; align-items: center; }
    #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    .spinner-border { color: #212529 !important; }
    
    .mrf-details-container { display: none; padding: 20px; border: 2px solid #212529; border-top: none; background: #fff; margin-bottom: 30px;}
    .supplier-block { border: 1px solid #dee2e6; border-radius: 5px; padding: 15px; margin-bottom: 20px; background: #fafafa;}
    .remove-supplier-btn { float: right; color: #dc3545; cursor: pointer; font-weight: bold;}

    /* Hidden Spinners for Number Inputs */
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
<div id="loader"><div class="spinner-border" style="width: 3rem; height: 3rem;"></div><div class="mt-3 fw-bold text-uppercase">Processing...</div></div>

<div class="header-custom">
  <? if (logo1Url) { ?><img src="<?= logo1Url ?>" class="logo-img" alt="Logo 1"><? } ?>
  <h1 class="header-title-main">Encode Supplier & Price</h1>
  <? if (logo2Url) { ?><img src="<?= logo2Url ?>" class="logo-img" alt="Logo 2"><? } ?>
</div>

<div class="user-bar">
  <? if (typeof currentUserName !== 'undefined' && currentUserName) { ?>
  <div class="text-end d-none d-md-block">
    <div class="fw-bold text-dark small"><?= currentUserName ?></div>
    <div class="text-muted" style="font-size: 0.75rem;"><i class="bi bi-person-badge text-dark"></i> <span class="text-uppercase fw-bold"><?= currentUserRole ?></span></div>
  </div>
  <? } ?>
  <button onclick="doLogout()" class="btn btn-sm btn-outline-danger border-1 fw-bold"><i class="bi bi-box-arrow-right"></i> LOGOUT</button>
</div>

<script>
  // Apps Script web apps run in a sandboxed iframe whose `sandbox` attribute
  // typically allows top-navigation-by-user-activation. Since the user just
  // clicked the LOGOUT button, that activation lets us navigate the top
  // window to the deployment URL — a clean full-page load that gets us back
  // to the login screen. If top-navigation is blocked, fall back to an
  // in-iframe replace with a cache-buster.
  const SCRIPT_URL = "<?= typeof scriptUrl !== 'undefined' ? scriptUrl : '' ?>";
  function doLogout() {
    try {
      localStorage.removeItem('mrfUser');
      localStorage.removeItem('mrfEmail');
      localStorage.removeItem('mrfRole');
    } catch (e) {}

    const target = SCRIPT_URL || (window.location.href.split('?')[0]);
    try {
      window.top.location.href = target;
      return;
    } catch (e) {
      // Top-navigation blocked — fall through.
    }
    window.location.replace(target + (target.indexOf('?') > -1 ? '&' : '?') + '_logout=' + Date.now());
  }
</script>

<div class="container-fluid px-5 pb-5">
  <div class="row mt-4 mb-1">
    <div class="col-12 text-end">
      <label class="fw-bold me-1 small text-uppercase">Date Range:</label>
      <input type="date" id="startDate" class="form-control form-control-sm d-inline-block w-auto border-dark fw-bold" onchange="filterEncodeQueue()">
      <span class="fw-bold mx-1">-</span>
      <input type="date" id="endDate" class="form-control form-control-sm d-inline-block w-auto border-dark fw-bold" onchange="filterEncodeQueue()">
      <button class="btn btn-sm btn-outline-dark ms-2" onclick="clearEncodeFilters()">CLEAR</button>
    </div>
  </div>

  <div class="mt-2"><h5 class="mb-4 fw-bold border-bottom pb-2 text-uppercase">Approved Items Pending Encoding</h5><div id="encodeQueueBody"></div></div>
</div>

<script>
  function showLoader() { document.getElementById('loader').style.display = 'flex'; }
  function hideLoader() { document.getElementById('loader').style.display = 'none'; }

  let globalGroupsData = [];
  let validSuppliers = [];

  window.onload = () => {
    google.script.run.withSuccessHandler(list => { 
        validSuppliers = list; 
        loadEncodeQueue();
    }).getSupplierList();
  };

  function loadEncodeQueue() {
    showLoader(); 
    google.script.run.withSuccessHandler(groups => {
      const body = document.getElementById('encodeQueueBody');
      if(!groups || !groups.length) { 
        body.innerHTML = '<div class="alert alert-secondary text-center">NO ITEMS PENDING ENCODING.</div>'; 
        hideLoader(); 
        return; 
      }
      
      globalGroupsData = groups; 
      
      let htmlString = "";
      groups.forEach(g => {
        htmlString += `
          <div class="batch-card" data-date="${g.date}" onclick="toggleDetails('${g.id}')">
            <div class="batch-header">
              <div><span class="badge bg-light text-dark me-2" style="font-size:0.75rem;">${g.date}</span><span>${g.id}</span> <strong>${g.project}</strong></div>
              <div class="small">REQ: ${g.requestor} <span style="margin-left: 10px;">▼</span></div>
            </div>
          </div>
          <div id="details-${g.id}" class="mrf-details-container">
             <div id="suppliers-container-${g.id}"></div>
             
             <div class="mb-4 mt-2" style="display: none;">
                <button class="btn btn-outline-dark btn-sm fw-bold" onclick="addSupplierBlock('${g.id}')">+ ADD SUPPLIER</button>
             </div>

            <div class="batch-footer" style="margin: -20px; margin-top: 20px;">
              <button class="btn btn-primary" onclick="submitEncoding('${g.id}')">SUBMIT ALL ENCODINGS</button>
            </div>
          </div>`;
      });
      
      body.innerHTML = htmlString;
      groups.forEach(g => addSupplierBlock(g.id));
      
      hideLoader(); 
    }).getApprovedMRFItems();
  }

  function filterEncodeQueue() {
      const startVal = document.getElementById('startDate').value;
      const endVal = document.getElementById('endDate').value;
      
      const start = startVal ? new Date(startVal) : null;
      const end = endVal ? new Date(endVal) : null;
      if(start) start.setHours(0,0,0,0);
      if(end) end.setHours(23,59,59,999);

      document.querySelectorAll('.batch-card').forEach(card => {
          const detailsId = card.getAttribute('onclick').match(/'([^']+)'/)[1];
          const details = document.getElementById('details-' + detailsId);
          
          let show = true;
          let cardDate = new Date(card.dataset.date);
          if (start && cardDate < start) show = false;
          if (end && cardDate > end) show = false;
          
          if (show) {
              card.style.display = 'block';
          } else {
              card.style.display = 'none';
              if(details) details.style.display = 'none';
          }
      });
  }

  function clearEncodeFilters() {
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      filterEncodeQueue();
  }

  function toggleDetails(mrfId) {
     const detailsDiv = document.getElementById('details-' + mrfId);
     if (detailsDiv.style.display === 'none' || detailsDiv.style.display === '') {
         detailsDiv.style.display = 'block';
     } else {
         detailsDiv.style.display = 'none';
     }
  }

  // Add a payment-term row inside an INDIVIDUAL ITEM (Per Item mode).
  function addPaymentTerm(rowId) {
     const container = document.getElementById('terms-' + rowId);
     const html = `
        <div class="d-flex gap-1 mb-1 term-row">
            <input type="text" class="form-control form-control-sm term-desc" placeholder="e.g. 50% DP">
            <input type="date" class="form-control form-control-sm term-date">
            <button class="btn btn-sm btn-outline-danger py-0 px-1 fw-bold" onclick="this.parentElement.remove()">✕</button>
        </div>
     `;
     container.insertAdjacentHTML('beforeend', html);
  }

  // Add a payment-term row to the SHARED schedule for an entire supplier (Per Supplier mode).
  function addSharedPaymentTerm(supplierId) {
     const container = document.getElementById('shared-terms-' + supplierId);
     if (!container) return;
     const html = `
        <div class="d-flex gap-1 mb-1 term-row">
            <input type="text" class="form-control form-control-sm term-desc" placeholder="e.g. 50% DP">
            <input type="date" class="form-control form-control-sm term-date">
            <button class="btn btn-sm btn-outline-danger py-0 px-1 fw-bold" onclick="this.parentElement.remove()">✕</button>
        </div>
     `;
     container.insertAdjacentHTML('beforeend', html);
  }

  // Toggle the supplier block between Per Supplier (shared schedule) and Per Item modes.
  // Hides/shows the shared section, the per-item terms column, and adjusts the
  // tfoot colspan so the GRAND TOTAL stays aligned.
  function setPaymentMode(supplierId, mode) {
     const block = document.getElementById(supplierId);
     if (!block) return;
     block.dataset.paymentMode = mode;

     const sharedSection = block.querySelector('.shared-terms-section');
     if (sharedSection) sharedSection.style.display = (mode === 'supplier') ? '' : 'none';

     const termsHeader = block.querySelector('.item-terms-header');
     if (termsHeader) termsHeader.style.display = (mode === 'supplier') ? 'none' : '';

     block.querySelectorAll('.item-terms-cell').forEach(c => c.style.display = (mode === 'supplier') ? 'none' : '');

     const footFirstCell = block.querySelector('tfoot td:first-child');
     if (footFirstCell) footFirstCell.colSpan = (mode === 'supplier') ? 4 : 5;
  }

  function addSupplierBlock(mrfId) {
     const container = document.getElementById('suppliers-container-' + mrfId);
     const groupData = globalGroupsData.find(g => g.id === mrfId);
     if (!groupData) return;

     const supplierId = 'sup-' + Date.now() + Math.floor(Math.random() * 1000);

     let rows = groupData.items.map(it => {
          const safeName = (it.name || "").toString().replace(/"/g, '&quot;');
          const unitLower = (it.unit || '').toString().trim().toLowerCase();
          const isBudget = ["labor budget", "material budget", "total budget", "labor cost", "material cost", "total cost", "labor", "material", "lot"].includes(unitLower);
          
          const displayQty = isBudget ? "-" : (it.qty || 0);
          const realQty = isBudget ? 1 : (it.qty || 0);
          const displayUnit = isBudget ? "-" : (it.unit || '');
          const uniqueRowId = `row-${Date.now()}-${Math.floor(Math.random() * 10000)}`;

          return `
          <tr class="item-row" data-item-name="${safeName}" data-original-unit="${it.unit || ''}">
            <td width="20%"><input type="text" class="form-control form-control-sm name-input" value="${safeName}" readonly style="background-color:#e9ecef; font-size: 0.8rem;"></td>
            <td width="8%"><input type="${isBudget ? 'text' : 'number'}" min="0" onkeydown="if(event.key==='-')return false;" class="form-control form-control-sm text-center qty-input-encode" value="${displayQty}" data-real-qty="${realQty}" oninput="calculateTotals('${supplierId}')" readonly style="background-color:#e9ecef; font-size: 0.8rem;"></td>
            <td width="8%"><input type="text" class="form-control form-control-sm text-center unit-input-encode" value="${displayUnit}" readonly style="background-color:#e9ecef; font-size: 0.8rem;"></td>
            <td width="15%"><input type="text" class="form-control form-control-sm price-input" placeholder="${isBudget ? 'Total Amount' : 'Unit Price'}" oninput="formatPrice(this); calculateTotals('${supplierId}')" onkeypress="return (event.charCode >= 48 && event.charCode <= 57) || event.charCode == 46"></td>

            <td width="30%" class="item-terms-cell">
                <div id="terms-${uniqueRowId}">
                    <div class="d-flex gap-1 mb-1 term-row">
                        <input type="text" class="form-control form-control-sm term-desc" placeholder="e.g. 50% DP">
                        <input type="date" class="form-control form-control-sm term-date">
                        <button class="btn btn-sm btn-outline-danger py-0 px-1 fw-bold" onclick="this.parentElement.remove()">✕</button>
                    </div>
                </div>
                <button class="btn btn-sm btn-outline-secondary w-100 py-0" style="font-size:0.75rem; font-weight:bold;" onclick="addPaymentTerm('${uniqueRowId}')">+ ADD TERM</button>
            </td>

            <td width="15%" class="text-end fw-bold subtotal-display align-middle">0.00</td>
          </tr>`;
     }).join('');

     const supplierOptions = validSuppliers.map(s => `<option value="${s}">${s}</option>`).join('');

     const blockHtml = `
        <div class="supplier-block" id="${supplierId}" data-payment-mode="supplier">
            <span class="remove-supplier-btn" style="display:none;" onclick="document.getElementById('${supplierId}').style.display='none'"></span>
            <div class="row mb-3 align-items-start g-3">
                <div class="col-md-4">
                    <label class="fw-bold small text-uppercase">Supplier Name <span class="text-danger">*</span></label>
                    <select class="form-select supplier-name-input">
                        <option value="">-- Select Supplier --</option>
                        <option value="test">Test Supplier</option>
                        ${supplierOptions}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="fw-bold small text-uppercase">Payment Schedule Applies</label>
                    <div class="btn-group btn-group-sm w-100" role="group" aria-label="Payment mode">
                        <input type="radio" class="btn-check" name="payment-mode-${supplierId}" id="pm-sup-${supplierId}" value="supplier" checked onchange="setPaymentMode('${supplierId}', 'supplier')">
                        <label class="btn btn-outline-dark fw-bold" for="pm-sup-${supplierId}">Per Supplier</label>
                        <input type="radio" class="btn-check" name="payment-mode-${supplierId}" id="pm-item-${supplierId}" value="item" onchange="setPaymentMode('${supplierId}', 'item')">
                        <label class="btn btn-outline-dark fw-bold" for="pm-item-${supplierId}">Per Item</label>
                    </div>
                    <small class="text-muted d-block mt-1">Each payment term becomes one check (one row in Payment Logs).</small>
                </div>
            </div>

            <div class="shared-terms-section mb-3 p-3 border rounded bg-light">
                <label class="fw-bold small text-uppercase">Payment Schedule — applies to every item from this supplier</label>
                <div id="shared-terms-${supplierId}" class="mt-1">
                    <div class="d-flex gap-1 mb-1 term-row">
                        <input type="text" class="form-control form-control-sm term-desc" placeholder="e.g. 50% DP">
                        <input type="date" class="form-control form-control-sm term-date">
                        <button class="btn btn-sm btn-outline-danger py-0 px-1 fw-bold" onclick="this.parentElement.remove()">✕</button>
                    </div>
                </div>
                <button class="btn btn-sm btn-outline-secondary py-0 fw-bold mt-1" onclick="addSharedPaymentTerm('${supplierId}')">+ ADD TERM</button>
            </div>

            <table class="table table-sm table-bordered mb-0 align-middle bg-white">
              <thead class="table-light"><tr>
                <th>Item</th><th class="text-center">Qty</th><th class="text-center">Unit</th>
                <th>Unit Price</th><th class="item-terms-header">Payment Schedule (Per Item)</th>
                <th class="text-end">Subtotal</th>
              </tr></thead>
              <tbody>${rows}</tbody>
              <tfoot>
                <tr class="table-light">
                  <td colspan="4" class="text-end fw-bold">GRAND TOTAL:</td>
                  <td class="text-end fw-bold grand-total-display">0.00</td>
                </tr>
              </tfoot>
            </table>
        </div>
     `;

     container.insertAdjacentHTML('beforeend', blockHtml);

     // Default to Per Supplier mode — hides the per-item terms column and
     // surfaces the shared schedule above the items table.
     setPaymentMode(supplierId, 'supplier');
  }

  function calculateTotals(supplierId) {
     const block = document.getElementById(supplierId);
     if (!block) return;
     
     const rows = block.querySelectorAll('.item-row');
     let grandTotal = 0;
     
     rows.forEach(row => {
        const isBudget = ["labor budget", "material budget", "total budget", "labor cost", "material cost", "total cost", "labor", "material", "lot"].includes((row.dataset.originalUnit || '').toString().trim().toLowerCase());
        const qtyRaw = row.querySelector('.qty-input-encode').dataset.realQty;
        const qty = parseFloat(qtyRaw) || 0;
        
        const priceRaw = row.querySelector('.price-input').value.replace(/,/g, '');
        const price = parseFloat(priceRaw) || 0;
        
        const subtotal = isBudget ? price : (qty * price);
        grandTotal += subtotal;
        
        row.querySelector('.subtotal-display').innerText = subtotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
     });
     
     block.querySelector('.grand-total-display').innerText = grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  function formatPrice(el) {
    let val = el.value.replace(/[^0-9.]/g, '');
    if (val) {
      let parts = val.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      el.value = parts.join('.');
    } else {
      el.value = ''; 
    }
  }

  function submitEncoding(mrfId) {
    const detailsContainer = document.getElementById('details-' + mrfId);
    const supplierBlocks = Array.from(detailsContainer.querySelectorAll('.supplier-block')).filter(block => block.style.display !== 'none');
    
    if (supplierBlocks.length === 0) {
        return Swal.fire('Warning', 'You must add at least one supplier before submitting.', 'warning');
    }

    let payloadUpdates = [];
    let validationFailed = false;

    for (let i = 0; i < supplierBlocks.length; i++) {
      let block = supplierBlocks[i];
      const supplierNameInput = block.querySelector('.supplier-name-input');
      const supplierName = supplierNameInput.value.trim();

      if (!supplierName) {
          supplierNameInput.style.borderColor = 'red';
          validationFailed = true;
          Swal.fire('Error', `Please select a valid supplier.`, 'error');
          break;
      } else {
          supplierNameInput.style.borderColor = '#ccc';
      }

      // Determine payment-term mode: 'supplier' (one schedule for the whole
      // supplier block) or 'item' (per-row schedules). Default 'supplier'.
      const paymentMode = block.dataset.paymentMode || 'supplier';

      // If Per Supplier, validate the shared schedule ONCE and reuse it for every priced item.
      let sharedTDescArr = [];
      let sharedTDateArr = [];
      if (paymentMode === 'supplier') {
        const sharedTermRows = block.querySelectorAll('.shared-terms-section .term-row');
        if (sharedTermRows.length === 0) {
          validationFailed = true;
          Swal.fire('Warning', 'Add at least one payment term in the shared schedule (or switch to Per Item mode).', 'warning');
          break;
        }
        let sharedError = false;
        for (let t = 0; t < sharedTermRows.length; t++) {
          const tDescInput = sharedTermRows[t].querySelector('.term-desc');
          const tDateInput = sharedTermRows[t].querySelector('.term-date');
          const tDesc = tDescInput.value.trim();
          const tDate = tDateInput.value;
          if (tDesc === "") { tDescInput.style.borderColor = 'red'; sharedError = true; } else { tDescInput.style.borderColor = '#ccc'; sharedTDescArr.push(tDesc); }
          if (tDate === "") { tDateInput.style.borderColor = 'red'; sharedError = true; } else { tDateInput.style.borderColor = '#ccc'; sharedTDateArr.push(tDate); }
        }
        if (sharedError) {
          validationFailed = true;
          Swal.fire('Warning', 'Every shared payment term needs both a description and a due date.', 'warning');
          break;
        }
      }

      const itemRows = block.querySelectorAll('.item-row');
      let supplierHasPrices = false;
      let blockItems = [];

      for (let j = 0; j < itemRows.length; j++) {
        let row = itemRows[j];
        const priceInput = row.querySelector('.price-input');
        const qtyInput = row.querySelector('.qty-input-encode');
        const unitInput = row.querySelector('.unit-input-encode');

        const combinedQty = parseFloat(qtyInput.dataset.realQty) || 0;
        const newUnit = unitInput.value.trim();
        const priceRaw = priceInput.value.replace(/,/g, '');
        const price = parseFloat(priceRaw) || 0;

        if (price > 0) {
          supplierHasPrices = true;
          priceInput.style.borderColor = '#ccc';

          let rowError = false;
          if (combinedQty <= 0) { qtyInput.style.borderColor = 'red'; rowError = true; } else { qtyInput.style.borderColor = '#ccc'; }
          if (newUnit === "") { unitInput.style.borderColor = 'red'; rowError = true; } else { unitInput.style.borderColor = '#ccc'; }

          let tDescArr, tDateArr;
          if (paymentMode === 'supplier') {
            // Reuse the validated shared schedule.
            tDescArr = sharedTDescArr;
            tDateArr = sharedTDateArr;
          } else {
            // Per Item mode — read this row's own term-row inputs.
            const termRows = row.querySelectorAll('.term-row');
            tDescArr = [];
            tDateArr = [];

            if (termRows.length === 0) {
               rowError = true;
               Swal.fire('Warning', 'You must add at least one Payment Term for priced items.', 'warning');
               break;
            }
            for (let t = 0; t < termRows.length; t++) {
               const tDescInput = termRows[t].querySelector('.term-desc');
               const tDateInput = termRows[t].querySelector('.term-date');
               const tDesc = tDescInput.value.trim();
               const tDate = tDateInput.value;
               if (tDesc === "") { tDescInput.style.borderColor = 'red'; rowError = true; } else { tDescInput.style.borderColor = '#ccc'; tDescArr.push(tDesc); }
               if (tDate === "") { tDateInput.style.borderColor = 'red'; rowError = true; } else { tDateInput.style.borderColor = '#ccc'; tDateArr.push(tDate); }
            }
          }

          if (rowError) {
             validationFailed = true;
             Swal.fire('Warning', 'For priced items, Quantity, Unit, Payment Term, and Due Date cannot be blank.', 'warning');
             break;
          }

          blockItems.push({
            itemName: row.dataset.itemName,
            originalUnit: row.dataset.originalUnit,
            price: price,
            qty: combinedQty,
            unit: newUnit,
            termDesc: tDescArr.join(" | "), // joined; backend splits to one row per term
            termDate: tDateArr.join(" | ")
          });
        } else if (priceRaw !== "") {
           priceInput.style.borderColor = 'red';
           validationFailed = true;
           break;
        } else {
           priceInput.style.borderColor = '#ccc';
           qtyInput.style.borderColor = '#ccc';
           unitInput.style.borderColor = '#ccc';
        }
      }
      if (validationFailed) break;

      if (!supplierHasPrices && supplierName) {
          validationFailed = true;
          Swal.fire('Warning', `Supplier "${supplierName}" has no prices entered. Enter prices or remove the supplier.`, 'warning');
          break; 
      }

      if (supplierName && supplierHasPrices) {
         payloadUpdates.push({
             mrfId: mrfId,
             supplierName: supplierName,
             items: blockItems
         });
      }
    }

    if (validationFailed) return; 

    document.getElementById('loader').style.display = 'flex';
    google.script.run.withSuccessHandler((res) => { 
      document.getElementById('loader').style.display = 'none';
      if(res.indexOf("Error") > -1) { Swal.fire('Warning', res, 'warning'); } 
      else { Swal.fire('Success', 'Encoding Submitted', 'success').then(loadEncodeQueue); }
    }).processEncoding(payloadUpdates);
  }
</script>
</body>
