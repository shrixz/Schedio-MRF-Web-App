<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
    .card { border-radius: 12px; border: none; }
    .header-custom { background: #ffffff; padding: 15px 40px; border-bottom: 5px solid #212529; display: flex; justify-content: space-between; align-items: center; }
    .header-title-main { text-align: center; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #212529; font-size: 1.8rem; margin: 0; flex-grow: 1; }
    .logo-img { height: 65px; width: auto; }
    #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    .spinner-border { color: #212529 !important; }
    /* Hidden Spinners for Number Inputs */
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
<div id="loader"><div class="spinner-border" style="width: 3rem; height: 3rem;"></div><div class="mt-3 fw-bold text-uppercase">Loading Data...</div></div>

<div class="header-custom">
  <? if (logo1Url) { ?><img src="<?= logo1Url ?>" class="logo-img" alt="Logo 1"><? } ?>
  <h1 class="header-title-main">Receiving Portal</h1>
  <? if (logo2Url) { ?><img src="<?= logo2Url ?>" class="logo-img" alt="Logo 2"><? } ?>
</div>

<div class="d-flex justify-content-center align-items-start" style="padding: 40px 20px;">
  <div class="card shadow-sm p-4" style="width: 100%; max-width: 900px; border-top: 5px solid #212529;">
    
    <h3 class="fw-bold text-dark text-center text-uppercase">Confirm Delivery</h3>
    <p class="text-muted text-center fw-bold mb-4" id="mrf-subtitle">MRF REFERENCE: <?= receiveToken ?></p>

    <div class="table-responsive">
       <table class="table table-bordered table-sm align-middle">
         <thead class="table-light">
           <tr>
             <th>ITEM DESCRIPTION</th>
             <th class="text-center">UNIT</th>
             <th class="text-center">QTY</th>
             <th class="text-center">REMAINING</th>
             <th style="width: 130px;" class="text-center">RCVD QTY</th>
             <th>REMARKS</th>
           </tr>
         </thead>
         <tbody id="receive-item-body">
         </tbody>
       </table>
    </div>

    <div class="mt-3 mb-3 p-3 bg-light border rounded">
      <label class="form-label fw-bold text-uppercase small text-dark" id="dr-label">Attach Delivery Receipt (Required)</label>
      <input type="file" id="dr-file" class="form-control" accept="image/*,application/pdf">
      <small class="text-muted">Please upload a photo or PDF of the delivery receipt.</small>
    </div>

    <button id="submitBtn" class="btn btn-dark w-100 fw-bold py-2 mt-2" onclick="submitReceiving()">CONFIRM DELIVERY</button>

    <div class="mt-5" id="history-section" style="display:none;">
      <h5 class="fw-bold text-dark text-uppercase border-bottom pb-2">Receiving History</h5>
      <div class="table-responsive mt-3">
         <table class="table table-striped table-sm align-middle">
           <thead class="table-light text-muted" style="font-size: 0.85rem;">
             <tr>
               <th>DATE ENCODED</th>
               <th>ITEM DESCRIPTION</th>
               <th class="text-center">RECEIVED</th>
               <th>REMARKS</th>
             </tr>
           </thead>
           <tbody id="history-item-body" style="font-size: 0.9rem;">
           </tbody>
         </table>
      </div>
    </div>

  </div>
</div>

<script>
  const RECEIVE_TOKEN = "<?= receiveToken ?>";
  let itemsData = [];
  let historyData = [];

  window.onload = () => { loadData(); };

  function loadData() {
    document.getElementById('loader').style.display = 'flex';
    
    google.script.run
      .withSuccessHandler(res => {
        document.getElementById('loader').style.display = 'none';
        if (res.error) {
          document.getElementById('receive-item-body').innerHTML = `<tr><td colspan="6" class="text-danger text-center fw-bold py-4">${res.error}</td></tr>`;
          document.getElementById('submitBtn').style.display = 'none';
          document.getElementById('dr-file').disabled = true;
        } else {
          itemsData = res.items;
          historyData = res.history;
          
          if (historyData && historyData.length > 0) {
            document.getElementById('dr-label').innerText = "Attach Delivery Receipt (Optional)";
          } else {
            document.getElementById('dr-label').innerText = "Attach Delivery Receipt (Required)";
          }

          renderTable();
          renderHistory();
        }
      })
      .withFailureHandler(err => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('receive-item-body').innerHTML = `<tr><td colspan="6" class="text-danger text-center fw-bold py-4">Server Connection Error: ${err.message}</td></tr>`;
        document.getElementById('submitBtn').style.display = 'none';
      })
      .getItemsForReceiving(RECEIVE_TOKEN);
  }

  function renderTable() {
    const body = document.getElementById('receive-item-body');
    body.innerHTML = itemsData.map((it, idx) => {
      const isComplete = it.remaining <= 0;
      const disableInput = isComplete ? "disabled" : "";
      const rowClass = isComplete ? "table-success opacity-75" : "";

      return `
      <tr class="${rowClass}">
        <td class="fw-bold">${it.name}</td>
        <td class="text-center">${it.unit}</td>
        <td class="text-center">${it.poQty}</td>
        <td class="text-center fw-bold ${isComplete ? 'text-success' : 'text-primary'}">${it.remaining}</td>
        <td><input type="number" class="form-control form-control-sm rcv-qty text-center" data-idx="${idx}" placeholder="0" min="0" max="${it.remaining}" ${disableInput}></td>
        <td><input type="text" class="form-control form-control-sm rcv-rem" data-idx="${idx}" placeholder="Remarks..." ${disableInput}></td>
      </tr>
    `}).join('');
  }

  function renderHistory() {
    const section = document.getElementById('history-section');
    const body = document.getElementById('history-item-body');
    
    if (!historyData || historyData.length === 0) {
      section.style.display = 'none';
      return;
    }
    
    section.style.display = 'block';
    body.innerHTML = historyData.map(log => `
      <tr>
        <td><span class="badge bg-secondary">${log.date}</span></td>
        <td class="fw-bold">${log.name}</td>
        <td class="text-center fw-bold text-success">+${log.qty}</td>
        <td>${log.remarks || '-'}</td>
      </tr>
    `).reverse().join(''); 
  }

  function submitReceiving() {
    const qtys = document.querySelectorAll('.rcv-qty');
    const rems = document.querySelectorAll('.rcv-rem');
    const finalItems = [];
    let hasValue = false;
    let overExceeded = false;

    qtys.forEach(inp => {
      const idx = inp.dataset.idx;
      const rcvdQty = parseFloat(inp.value) || 0;
      const remaining = itemsData[idx].remaining;
      
      if (rcvdQty > remaining) overExceeded = true;
      if (rcvdQty > 0) hasValue = true;
      
      finalItems.push({
        name: itemsData[idx].name,
        rcvdQty: rcvdQty,
        remarks: rems[idx].value || ""
      });
    });

    if (overExceeded) return Swal.fire("Warning", "You cannot receive more than the remaining quantity.", "warning");
    if (!hasValue) return Swal.fire("Warning", "Please enter a received quantity greater than 0 for at least one item.", "warning");

    const fileInput = document.getElementById('dr-file');
    const hasHistory = historyData && historyData.length > 0;
    
    if (!hasHistory && fileInput.files.length === 0) {
      return Swal.fire("Warning", "Please attach the Delivery Receipt before confirming.", "warning");
    }

    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const reader = new FileReader();

      reader.onload = (e) => {
        const fileData = {
          data: e.target.result.split(',')[1],
          fileName: file.name,
          mimeType: file.type
        };
        executeSubmission(finalItems, fileData);
      };
      
      reader.readAsDataURL(file);
    } else {
      executeSubmission(finalItems, null);
    }
  }

  function executeSubmission(finalItems, fileData) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = 'PROCESSING...';
    document.getElementById('loader').style.display = 'flex';

    google.script.run
      .withSuccessHandler(res => {
        document.getElementById('loader').style.display = 'none';
        btn.disabled = false;
        btn.innerHTML = 'CONFIRM DELIVERY';
        
        if(res.indexOf("Error") > -1) {
          Swal.fire('Error', res, 'error');
        } else {
          Swal.fire('Success', res, 'success').then(() => {
            document.getElementById('dr-file').value = ""; 
            loadData(); 
          });
        }
      })
      .withFailureHandler(err => {
        document.getElementById('loader').style.display = 'none';
        btn.disabled = false;
        btn.innerHTML = 'CONFIRM DELIVERY';
        Swal.fire('Error', 'Server connection failed: ' + err.message, 'error');
      })
      .submitReceivedItems(RECEIVE_TOKEN, finalItems, fileData);
  }
</script>
</body>
</html>
